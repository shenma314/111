<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学成果奖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        .swiper-button-next, .swiper-button-prev { color: white; }
        .swiper-pagination-bullet-active { background: #1e40af; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-blue-800 rounded-full flex items-center justify-center text-white font-bold">教</div>
                <span class="text-xl font-bold tracking-wider text-blue-900">教学成果奖申报展示平台</span>
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#" class="text-blue-700">首页</a>
                <a href="#" class="hover:text-blue-700">奖项概况</a>
                <a href="#" class="hover:text-blue-700">通知公告</a>
                <a href="#" class="hover:text-blue-700">成果大厅</a>
                <a href="#" class="bg-blue-700 text-white px-4 py-1 rounded-full hover:bg-blue-800">申报入口</a>
            </div>
        </div>
    </nav>

    <div class="swiper mySwiper h-[500px]">
        <div class="swiper-wrapper">
            <div class="swiper-slide relative flex items-center justify-center bg-blue-900">
                <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div class="relative z-10 text-center text-white px-4">
                    <h2 class="text-4xl md:text-6xl font-bold mb-4">立德树人 · 追求卓越</h2>
                    <p class="text-xl md:text-2xl mb-8">2025年度国家级教学成果奖评选工作正式启动</p>
                    <button class="bg-yellow-500 hover:bg-yellow-600 text-blue-900 font-bold py-3 px-8 rounded-lg transition">了解政策详情</button>
                </div>
            </div>
            <div class="swiper-slide relative flex items-center justify-center bg-indigo-900">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover opacity-40">
                <div class="relative z-10 text-center text-white px-4">
                    <h2 class="text-4xl md:text-6xl font-bold mb-4">创新驱动 协同育人</h2>
                    <p class="text-xl md:text-2xl mb-8">展示历届优秀教学成果，发挥示范引领作用</p>
                    <button class="bg-white text-blue-900 font-bold py-3 px-8 rounded-lg transition">浏览成果大厅</button>
                </div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-pagination"></div>
    </div>

    <section class="container mx-auto py-12 px-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center bg-white p-8 rounded-xl shadow-sm">
            <div><div class="text-3xl font-bold text-blue-800">156</div><div class="text-gray-500">本届申报项目</div></div>
            <div><div class="text-3xl font-bold text-blue-800">42</div><div class="text-gray-500">涵盖学科门类</div></div>
            <div><div class="text-3xl font-bold text-blue-800">890</div><div class="text-gray-500">参与教师人数</div></div>
            <div><div class="text-3xl font-bold text-blue-800">12</div><div class="text-gray-500">评审专家库(组)</div></div>
        </div>
    </section>

    <section class="container mx-auto py-8 px-6">
        <div class="flex justify-between items-end mb-8 border-l-4 border-blue-800 pl-4">
            <h3 class="text-2xl font-bold">精选成果展示</h3>
            <a href="#" class="text-blue-700 hover:underline">查看更多 >></a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white rounded-lg overflow-hidden shadow-md hover:shadow-xl transition">
                <div class="h-48 bg-gray-200 relative">
                    <span class="absolute top-2 left-2 bg-red-600 text-white text-xs px-2 py-1 rounded">特等奖</span>
                    <img src="https://images.unsplash.com/photo-1427504494785-3a9ca7044f45?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover">
                </div>
                <div class="p-6">
                    <h4 class="font-bold text-lg mb-2">多维互动式智慧课堂教学模式构建与实践</h4>
                    <p class="text-gray-600 text-sm mb-4">负责人：张教授 团队</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">更新时间：2025-03</span>
                        <button class="text-blue-700 font-semibold">查看详情</button>
                    </div>
                </div>
            </div>
            </div>
    </section>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            loop: true,
            autoplay: { delay: 4000 },
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        });
    </script>
</body>
</html>
